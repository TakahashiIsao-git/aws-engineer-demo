AWSTemplateFormatVersion: "2010-09-09"
Description: AWS Study environment compute stack（ALB and EC2）
# ---------------------------------------
# AWS Study 11
# network → compute → database
# 段階的にスタック作成して動作確認するテンプレート
# ---------------------------------------


# テンプレートを再利用可能にするため、
# InStanceTypeとKeyNameをParameter化
Parameters:
  InstanceType:
    Type: String
    Default: t2.micro
    # 入力ミスと意図しないインスタンス起動の防止
    AllowedValues:
      - t2.micro
      - t3.micro

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName


Resources:
  # VPC
  StudyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.1.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: aws-study-vpc


  # Subnet 
  # PublicSubnetはALBアクセス用 
  StudyPublicSubnetAz1a:
    Type: AWS::EC2::Subnet 
    Properties: 
      VpcId: !Ref StudyVPC 
      CidrBlock: 10.1.1.0/24
      # 学習課題としてEC2へSSH接続して動作確認を行うためにtrueを設定
      MapPublicIpOnLaunch: true
      # AZを固定値（ap-northeast-1a）ではなく
      # !GetAZsで動的取得することで他のリージョンでも再利用可能にしている
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags: 
        - Key: Name 
          Value: aws-study-public-subnet1a 
          
          
  StudyPublicSubnetAz1c:
    Type: AWS::EC2::Subnet 
    Properties:
      VpcId: !Ref StudyVPC 
      CidrBlock: 10.1.2.0/24
      # 学習課題としてEC2へSSH接続して動作確認を行うためにtrueを設定
      MapPublicIpOnLaunch: true
      # AZを固定値（ap-northeast-1c）ではなく
      # !GetAZsで動的取得することで他のリージョンでも再利用可能にしている
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: aws-study-public-subnet1c


  # PrivateSubnetは外部インターネットから直接アクセスさせない
  # NAT Gatewayを設置していないが、今回はRDS用として事前にPrivateSubnetを作成する 
  StudyPrivateSubnetAz1a:
    Type: AWS::EC2::Subnet
    Properties: 
      VpcId: !Ref StudyVPC 
      CidrBlock: 10.1.11.0/24
      # AZを固定値（ap-northeast-1a）ではなく
      # !GetAZsで動的取得することで他のリージョンでも再利用可能にしている
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags: 
        - Key: Name 
          Value: aws-study-private-subnet1a
  
  StudyPrivateSubnetAz1c: 
    Type: AWS::EC2::Subnet 
    Properties: 
      VpcId: !Ref StudyVPC 
      CidrBlock: 10.1.12.0/24
      # AZを固定値（ap-northeast-1c）ではなく
      # !GetAZsで動的取得することで他のリージョンでも再利用可能にしている
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags: 
        - Key: Name 
          Value: aws-study-private-subnet1c


  # インターネット通信を可能にするInternet Gatewayの作成
  # （EC2にSSH接続して動作確認を行う学習課題のため）
  StudyInternetGateway:  
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: aws-study-igw


  # EC2にSSH接続して動作確認を行うため、Internet GatewayをVPCにアタッチし、
  # 0.0.0.0/0をIGWに向けたルートの定義
  StudyVPCGatewayAttachment: 
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref StudyVPC
      InternetGatewayId: !Ref StudyInternetGateway


  # パブリックサブネット用のルートテーブル。
  # 0.0.0.0/0をInternet Gatewayに向けることでインターネット通信を可能にしている。
  StudyPublicRouteTable: 
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref StudyVPC
      Tags:
        - Key: Name
          Value: aws-study-public-rt


  # インターネット向け通信（0.0.0.0/0）をInternet Gateway経由で許可するルート定義
  StudyPublicRoute: 
    Type: AWS::EC2::Route
    DependsOn: StudyVPCGatewayAttachment
    Properties:
      RouteTableId: !Ref StudyPublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0 
      GatewayId: !Ref StudyInternetGateway   


  # サブネットとルートテーブルの関連付け
  StudySubnetRouteTableAssociationAz1a: 
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref StudyPublicRouteTable
      SubnetId: !Ref StudyPublicSubnetAz1a

  StudySubnetRouteTableAssociationAz1c: 
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref StudyPublicRouteTable
      SubnetId: !Ref StudyPublicSubnetAz1c


  # ALB用セキュリティグループ
  ALBSecurityGroup: 
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: AWS Study ALB
      VpcId: !Ref StudyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      # 明示的に追加（アウトバウンドルールの設定も必要なため）
      SecurityGroupEgress: 
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: aws-study-alb-sg


  # EC2用セキュリティグループ
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: AWS Study EC2
      VpcId: !Ref StudyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          # 学習用のため固定IPからSSH接続を許可しているが、
          # 実務では踏み台サーバまたはSSM Session Managerの利用が推奨される
          CidrIp: 210.128.165.154/32
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: aws-study-ec2-sg
  

  # EC2インスタンス
  StudyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      # AMIを固定値化（SSM Parameterでの取得は望んでいない最新化が発生する可能性があるため）
      ImageId: ami-09cd9fdbf26acc6b4
      # 固定値からParameter化に変更
      InstanceType: !Ref InstanceType
      # 学習用のためPublicSubnetに配置しているが、
      # 実務ではPrivateSubnetに配置しALB経由のみアクセスさせる構成が望ましい
      SubnetId: !Ref StudyPublicSubnetAz1a
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      # 固定値からParameter化に変更
      KeyName: !Ref KeyName
      # EC2起動時に簡単なWebサーバの自動起動設定（TargetGroupのunhealthy対策）
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          echo "Hello AWS Study" > /var/www/html/index.html
          systemctl enable httpd
          systemctl start httpd
      # 本番環境では誤削除防止のため有効化するが、
      # 学習環境ではEC2の削除できなくなるのでFalseを設定
      DisableApiTermination: false
      # 今回は学習のため未設定だが、
      # 実務ではIAMロールを付与しSSMやCloudWatchを利用する前提
      Tags:
        - Key: Name
          Value: aws-study-ec2
  

  # ロードバランサー
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: aws-study-alb
      Scheme: internet-facing
      Type: application
      # マルチAZ構成にすることで単一AZ障害時もサービス継続できるようにしている
      Subnets: 
        - !Ref StudyPublicSubnetAz1a
        - !Ref StudyPublicSubnetAz1c
      SecurityGroups:
        - !Ref ALBSecurityGroup
      # 本番環境では誤削除防止のため有効化するが、
      # 学習環境ではスタック削除時に支障が出るためFalseを設定
      LoadBalancerAttributes:
        - Key: deletion_protection.enabled
          Value: false
      Tags:
        - Key: Name
          Value: aws-study-alb


  # ターゲットグループ
  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: aws-study-tg
      VpcId: !Ref StudyVPC
      Protocol: HTTP
      Port: 80
      HealthCheckProtocol: HTTP
      # httpdのデフォルトページで疎通確認を行い、
      # アプリケーションの正常応答を確認するため「/」を指定
      HealthCheckPath: /
      HealthCheckPort: "traffic-port"
      HealthyThresholdCount: 5
      UnhealthyThresholdCount: 2
      HealthCheckTimeoutSeconds: 5
      HealthCheckIntervalSeconds: 30
      Matcher: 
        HttpCode: 200-301
      Targets:
        - Id: !Ref StudyEC2Instance
          Port: 80
      Tags:
        - Key: Name
          Value: aws-study-tg


  # ALB Listener（HTTPリクエストをALBTargetGroupへ転送）
  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup
  

# スタック作成後に主要リソースを確認しやすくするためOutputsで出力。
# VPCIdはVPC識別用、ALBDNSNameはブラウザ接続確認用、
# EC2InstanceIdはインスタンス特定や運用確認のため出力。
Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref StudyVPC

  ALBDNSName:
    Description: ALB DNS Name（ブラウザアクセス確認用）
    Value: !GetAtt ApplicationLoadBalancer.DNSName

  EC2InstanceId:
    Description: EC2 Instance ID
    Value: !Ref StudyEC2Instance

